apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenscale-orchestrator
  namespace: greenscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greenscale-orchestrator
  template:
    metadata:
      labels:
        app: greenscale-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: greenscale-orchestrator:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: greenscale-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: greenscale-orchestrator
  namespace: greenscale
spec:
  type: ClusterIP
  selector:
    app: greenscale-orchestrator
  ports:
    - port: 8080
      targetPort: 8080
      name: http
