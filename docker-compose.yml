services:
  orchestrator:
    build: ./orchestrator
    container_name: greenscale-orchestrator
    ports:
    - 8080:8080
    environment:
      ELECTRICITY_MAPS_TOKEN: ${ELECTRICITY_MAPS_TOKEN:-}
      STRICT_SLO: ${STRICT_SLO:-true}
      SCHEDULER_ALPHA_LATENCY: ${SCHEDULER_ALPHA_LATENCY:-0.45}
      SCHEDULER_BETA_COST: ${SCHEDULER_BETA_COST:-0.20}
      SCHEDULER_GAMMA_CARBON: ${SCHEDULER_GAMMA_CARBON:-0.25}
      SCHEDULER_DELTA_COLDSTART: ${SCHEDULER_DELTA_COLDSTART:-0.10}
      REGION_ENDPOINTS: "[\n  {\"name\":\"aws-us-east-1\",\"provider\":\"aws\",\"\
        url\":\"http://aws-worker:9000\",\"zone\":\"US-MIDA-PJM\",\"base_latency_ms\"\
        :95,\"carbon_gco2_kwh\":410,\"cost_per_million_requests\":0.22,\"cold_start_ms\"\
        :180,\"capacity_weight\":1.0},\n  {\"name\":\"azure-westus\",\"provider\"\
        :\"azure\",\"url\":\"http://azure-worker:9000\",\"zone\":\"US-CAL-CISO\",\"\
        base_latency_ms\":125,\"carbon_gco2_kwh\":260,\"cost_per_million_requests\"\
        :0.25,\"cold_start_ms\":150,\"capacity_weight\":1.0},\n  {\"name\":\"gcp-us-central1\"\
        ,\"provider\":\"gcp\",\"url\":\"http://gcp-worker:9000\",\"zone\":\"US-MIDW-MISO\"\
        ,\"base_latency_ms\":80,\"carbon_gco2_kwh\":520,\"cost_per_million_requests\"\
        :0.20,\"cold_start_ms\":120,\"capacity_weight\":1.0}\n]"
    depends_on:
      aws-worker:
        condition: service_healthy
      azure-worker:
        condition: service_healthy
      gcp-worker:
        condition: service_healthy
  aws-worker:
    build: ./worker
    container_name: greenscale-aws-worker
    environment:
      REGION_NAME: aws-us-east-1
      PROVIDER: aws
      SIMULATED_LATENCY_MS: 95
      COLD_START_PROBABILITY: 0.18
      COLD_START_MS: 180
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9000/health').read()
      interval: 5s
      timeout: 3s
      retries: 20
  azure-worker:
    build: ./worker
    container_name: greenscale-azure-worker
    environment:
      REGION_NAME: azure-westus
      PROVIDER: azure
      SIMULATED_LATENCY_MS: 125
      COLD_START_PROBABILITY: 0.1
      COLD_START_MS: 150
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9000/health').read()
      interval: 5s
      timeout: 3s
      retries: 20
  gcp-worker:
    build: ./worker
    container_name: greenscale-gcp-worker
    environment:
      REGION_NAME: gcp-us-central1
      PROVIDER: gcp
      SIMULATED_LATENCY_MS: 80
      COLD_START_PROBABILITY: 0.12
      COLD_START_MS: 120
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9000/health').read()
      interval: 5s
      timeout: 3s
      retries: 20
  locust:
    profiles:
    - loadtest
    build:
      context: ./loadtest
    ports:
    - 8089:8089
    environment:
      TARGET_HOST: http://orchestrator:8080
    depends_on:
    - orchestrator
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: greenscale-prometheus
    ports:
    - 9090:9090
    volumes:
    - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
    - orchestrator
    - aws-worker
    - azure-worker
    - gcp-worker
  grafana:
    image: grafana/grafana:11.4.0
    container_name: greenscale-grafana
    ports:
    - 3000:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-greenscale}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/greenscale-dashboard.json
    volumes:
    - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
    - prometheus
