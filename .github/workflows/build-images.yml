name: Build GreenScale Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build
        required: true
        default: v1
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/greenscale-orchestrator:${{ steps.vars.outputs.tag }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/greenscale-worker:${{ steps.vars.outputs.tag }}
